services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jungle-ai-mentor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jungle
      POSTGRES_PASSWORD: jungle
      POSTGRES_DB: jungle_ai_mentor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jungle -d jungle_ai_mentor"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
